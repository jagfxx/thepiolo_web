name: Email Notification on Push

on:
  push:
    branches:
      - main

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - name: Verify email secrets are configured
        run: |
          if [ -z "${{ secrets.EMAIL_USERNAME }}" ] || [ -z "${{ secrets.EMAIL_PASS }}" ]; then
            echo "::error::Faltan los secrets EMAIL_USERNAME y/o EMAIL_PASS en este repositorio."
            echo "::error::Configúralos en Settings → Secrets and variables → Actions"
            echo "::error::Guía: .github/EMAIL_SETUP.md (usa los mismos valores que en TSM-WEB)"
            exit 1
          fi
          echo "✅ Secrets de correo detectados"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get commit information
        id: commit-info
        run: |
          COMMIT_MESSAGE=$(git log -1 --pretty=format:"%s")
          COMMIT_AUTHOR=$(git log -1 --pretty=format:"%an <%ae>")
          COMMIT_HASH=$(git log -1 --pretty=format:"%h")
          COMMIT_DATE=$(git log -1 --pretty=format:"%ad" --date=format:"%d/%m/%Y %H:%M:%S")
          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"

          if [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            FILES_CHANGED=$(git diff --name-status ${{ github.event.before }} ${{ github.sha }} 2>/dev/null || echo "")
          else
            FILES_CHANGED=$(git diff --name-status --root ${{ github.sha }} 2>/dev/null || git ls-tree -r --name-only HEAD | sed 's/^/A\t/' || echo "")
          fi

          if [ -z "$FILES_CHANGED" ]; then
            FILES_CHANGED=$(git show --name-status --pretty=format: ${{ github.sha }} | grep -E "^[AMD]" | head -20 || echo "Sin cambios detectados")
          fi

          FILES_CHANGED=$(echo "$FILES_CHANGED" | head -20)

          if [ -z "$FILES_CHANGED" ] || [ "$FILES_CHANGED" = "Sin cambios detectados" ]; then
            ADDED="0"
            MODIFIED="0"
            DELETED="0"
            FILES_CHANGED="No se detectaron cambios en archivos"
          else
            ADDED_COUNT=$(echo "$FILES_CHANGED" | grep -c "^A" 2>/dev/null || true)
            MODIFIED_COUNT=$(echo "$FILES_CHANGED" | grep -c "^M" 2>/dev/null || true)
            DELETED_COUNT=$(echo "$FILES_CHANGED" | grep -c "^D" 2>/dev/null || true)
            ADDED=${ADDED_COUNT:-0}
            MODIFIED=${MODIFIED_COUNT:-0}
            DELETED=${DELETED_COUNT:-0}
          fi

          echo "commit_message<<COMMIT_MSG_EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_MESSAGE" >> $GITHUB_OUTPUT
          echo "COMMIT_MSG_EOF" >> $GITHUB_OUTPUT
          echo "commit_author<<COMMIT_AUTH_EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_AUTHOR" >> $GITHUB_OUTPUT
          echo "COMMIT_AUTH_EOF" >> $GITHUB_OUTPUT
          echo "commit_hash=$COMMIT_HASH" >> $GITHUB_OUTPUT
          echo "commit_date=$COMMIT_DATE" >> $GITHUB_OUTPUT
          echo "commit_url=$COMMIT_URL" >> $GITHUB_OUTPUT
          echo "files_changed<<FILES_EOF" >> $GITHUB_OUTPUT
          echo "$FILES_CHANGED" >> $GITHUB_OUTPUT
          echo "FILES_EOF" >> $GITHUB_OUTPUT
          echo "added=$ADDED" >> $GITHUB_OUTPUT
          echo "modified=$MODIFIED" >> $GITHUB_OUTPUT
          echo "deleted=$DELETED" >> $GITHUB_OUTPUT

      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "Nuevo Push a Main - THEPIOLO Web"
          to: thepiolo.co@gmail.com,transportservicemedellin@gmail.com
          from: THEPIOLO <${{ secrets.EMAIL_USERNAME }}>
          html_body: |
            <!DOCTYPE html>
            <html>
            <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
            </head>
            <body style="font-family: 'Segoe UI', Arial, sans-serif; line-height: 1.6; color: #f4f4f8; margin: 0; padding: 0; background-color: #13131e;">
              <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #13131e; padding: 20px;">
                <tr>
                  <td align="center">
                    <table width="600" cellpadding="0" cellspacing="0" style="background-color: #1a1a28; border: 1px solid #2a2a3d; border-radius: 8px; overflow: hidden;">
                      <tr>
                        <td style="background: linear-gradient(135deg, #b440ff, #ff71e4, #ff2e2e); padding: 30px; text-align: center;">
                          <h1 style="margin: 0; font-size: 26px; font-weight: bold; color: #ffffff;">Nuevo Push a Main</h1>
                          <p style="margin: 10px 0 0 0; font-size: 15px; color: rgba(255,255,255,0.9);">THEPIOLO — Portfolio Web (thepiolo.icu)</p>
                        </td>
                      </tr>
                      <tr>
                        <td style="padding: 30px;">
                          <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #222233; border-left: 4px solid #b440ff; border-radius: 4px; margin-bottom: 20px; border: 1px solid #2a2a3d;">
                            <tr>
                              <td style="padding: 15px;">
                                <strong style="color: #ff71e4; font-size: 14px;">Mensaje del Commit:</strong><br>
                                <span style="color: #c8c8d4; font-size: 14px; display: block; margin-top: 8px;">${{ steps.commit-info.outputs.commit_message }}</span>
                              </td>
                            </tr>
                          </table>
                          <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom: 20px;">
                            <tr>
                              <td width="33%" align="center" style="padding: 5px;">
                                <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #222233; border: 1px solid #2a2a3d; border-radius: 4px;">
                                  <tr>
                                    <td align="center" style="padding: 15px;">
                                      <div style="font-size: 28px; font-weight: bold; color: #b440ff;">${{ steps.commit-info.outputs.added }}</div>
                                      <div style="font-size: 11px; color: #8b8b9e; margin-top: 5px; text-transform: uppercase;">Agregados</div>
                                    </td>
                                  </tr>
                                </table>
                              </td>
                              <td width="33%" align="center" style="padding: 5px;">
                                <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #222233; border: 1px solid #2a2a3d; border-radius: 4px;">
                                  <tr>
                                    <td align="center" style="padding: 15px;">
                                      <div style="font-size: 28px; font-weight: bold; color: #ff71e4;">${{ steps.commit-info.outputs.modified }}</div>
                                      <div style="font-size: 11px; color: #8b8b9e; margin-top: 5px; text-transform: uppercase;">Modificados</div>
                                    </td>
                                  </tr>
                                </table>
                              </td>
                              <td width="33%" align="center" style="padding: 5px;">
                                <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #222233; border: 1px solid #2a2a3d; border-radius: 4px;">
                                  <tr>
                                    <td align="center" style="padding: 15px;">
                                      <div style="font-size: 28px; font-weight: bold; color: #ff2e2e;">${{ steps.commit-info.outputs.deleted }}</div>
                                      <div style="font-size: 11px; color: #8b8b9e; margin-top: 5px; text-transform: uppercase;">Eliminados</div>
                                    </td>
                                  </tr>
                                </table>
                              </td>
                            </tr>
                          </table>
                          <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #222233; border-left: 4px solid #b440ff; border-radius: 4px; margin-bottom: 20px; border: 1px solid #2a2a3d;">
                            <tr>
                              <td style="padding: 15px; color: #c8c8d4; font-size: 13px;">
                                <strong style="color: #ff71e4;">Autor:</strong> ${{ steps.commit-info.outputs.commit_author }}<br>
                                <strong style="color: #ff71e4;">Fecha:</strong> ${{ steps.commit-info.outputs.commit_date }}<br>
                                <strong style="color: #ff71e4;">Hash:</strong> ${{ steps.commit-info.outputs.commit_hash }}<br>
                                <strong style="color: #ff71e4;">Repositorio:</strong> ${{ github.repository }}
                              </td>
                            </tr>
                          </table>
                          <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #222233; border-left: 4px solid #b440ff; border-radius: 4px; margin-bottom: 20px; border: 1px solid #2a2a3d;">
                            <tr>
                              <td style="padding: 15px;">
                                <strong style="color: #ff71e4; font-size: 13px;">Archivos Cambiados:</strong>
                                <div style="background-color: #13131e; padding: 12px; margin-top: 10px; border-radius: 4px; border: 1px solid #2a2a3d; font-family: 'Courier New', monospace; font-size: 11px; max-height: 200px; overflow-y: auto;">
                                  <pre style="margin: 0; white-space: pre-wrap; word-wrap: break-word; font-family: 'Courier New', monospace; color: #c8c8d4;">${{ steps.commit-info.outputs.files_changed }}</pre>
                                </div>
                              </td>
                            </tr>
                          </table>
                          <table width="100%" cellpadding="0" cellspacing="0">
                            <tr>
                              <td align="center" style="padding: 20px 0;">
                                <a href="${{ steps.commit-info.outputs.commit_url }}" style="display: inline-block; padding: 14px 28px; background: linear-gradient(135deg, #b440ff, #ff71e4); color: #ffffff; text-decoration: none; border-radius: 999px; font-weight: bold; font-size: 14px;">Ver Commit en GitHub</a>
                              </td>
                            </tr>
                          </table>
                        </td>
                      </tr>
                      <tr>
                        <td style="padding: 20px; text-align: center; border-top: 1px solid #2a2a3d;">
                          <p style="margin: 0; color: #8b8b9e; font-size: 11px;">Correo automático — GitHub Actions</p>
                          <p style="margin: 5px 0 0 0; color: #8b8b9e; font-size: 11px;">THEPIOLO © 2025</p>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
            </body>
            </html>
